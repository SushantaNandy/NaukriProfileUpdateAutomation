name: Naukri Profile Boost

on:
  push:
    branches:
      - main
      - feat/multi-user-support
  schedule:
    - cron: '30 3-10 * * 1-5' # 9:00 AM - 4:00 PM IST (Mon-Fri)
  workflow_dispatch:

jobs:
  update-profile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - user: SUSHANTA
            resume_path: ./data/SDETSushantaResume.pdf
            role: 'Software Engineer'
            proof_points: 'Backend Expert, FNZ Group, Playwright'
          - user: JANVI
            resume_path: ./data/Janvi_Rai_Marketing_Analyst_Resume.docx
            role: 'Marketing Analyst'
            proof_points: '15%+ YouTube Growth, GA4, ROI Tracking, Great Learning'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended stable version
          
      - name: Install Dependencies
        run: npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install chromium
        
      - name: Reconstruct Auth State
        env:
          SECRET_AUTH_STATE: ${{ secrets[format('{0}_AUTH_STATE', matrix.user)] }}
        run: |
          mkdir -p playwright/.auth
          echo "$SECRET_AUTH_STATE" > playwright/.auth/${{ matrix.user }}.json
          
      - name: Run Playwright Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAUKRI_EMAIL: ${{ secrets[format('{0}_EMAIL', matrix.user)] }}
          NAUKRI_PASSWORD: ${{ secrets[format('{0}_PASSWORD', matrix.user)] }}
          NAUKRI_RESUME_PATH: ${{ matrix.resume_path }}
          matrix_user: ${{ matrix.user }}
          USER_ROLE: ${{ matrix.role }}
          USER_PROOF_POINTS: ${{ matrix.proof_points }}
        run: npm run test
        
      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
