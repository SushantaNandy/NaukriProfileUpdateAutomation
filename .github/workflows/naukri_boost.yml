name: Naukri Profile Boost

on:
  schedule:
    - cron: '30 3-9 * * *' # Runs every hour between 9:00 AM and 3:00 PM IST
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  update-profile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - user: SUSHANTA
            resume_path: ./data/SDETSushantaResume.pdf
          - user: JANVI
            resume_path: ./data/Janvi_Rai_Marketing_Analyst_Resume.docx
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended stable version
          
      - name: Install Dependencies
        run: npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install chromium
        
      - name: Reconstruct Auth State
        env:
          SECRET_AUTH_STATE: ${{ secrets.SECRET_AUTH_STATE }}
        run: |
          mkdir -p data
          echo "$SECRET_AUTH_STATE" > data/auth_state.json
          
      - name: Run Playwright Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAUKRI_EMAIL: ${{ secrets[format('{0}_EMAIL', matrix.user)] }}
          NAUKRI_PASSWORD: ${{ secrets[format('{0}_PASSWORD', matrix.user)] }}
          NAUKRI_RESUME_PATH: ${{ matrix.resume_path }}
        run: npm run test
        
      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
